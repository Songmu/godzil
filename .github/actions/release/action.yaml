name: release
description: release godzil
inputs:
  tag:
    description: tag name to be released
    default: ''
  token:
    description: GitHub token
    required: true
runs:
  using: composite
  steps:
  - name: setup go
    uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
    with:
      go-version-file: go.mod
  - name: crossbuild
    run: |
      make crossbuild
    shell: bash
  - uses: tcnksm/ghr@766f869eacbbb086e8860cf0f0192dda6e8e67e1 # v0.18.3
    with:
      tag: ${{ inputs.tag }}
      token: ${{ inputs.token }}
      path: "dist"
